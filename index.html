<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="css/index.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css"
    />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&icon_names=settings"
    />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&icon_names=dashboard"
    />
    <title>Document</title>
  </head>
  <body>
    <section class="app">
      <sidebar class="app-sidebar">
        <img src="img/Logo.png" class="logo" alt="" />
        <h1>SILTECH</h1>
        <nav class="nav-sidebar ">
          <div class="card-nav">
            <i class="bi bi-clipboard-plus icon"></i>
            <p class="p-nav">Proposta</p>
          </div>
          <div class="card-nav">
            <i class="bi bi-graph-up-arrow icon"></i>
            <p class="p-nav">Dashboard</p>
          </div>
          <div class="card-nav">
            <i class="bi bi-card-list icon"></i>
            <p class="p-nav">Projetos</p>
          </div>
          <div class="card-nav">
            <i class="bi bi-database icon"></i>
            <p class="p-nav">Banco</p>
          </div>
          <div class="card-nav">
            <i class="bi bi-gear icon"></i>
            <p class="p-nav">Configurações</p>
          </div>
        </nav>
        <p>Versão v1.0.0</p>
      </sidebar>
      <main >
        <section class="section-group">
          <h2 class="title-container">Proposta Comercial</h2>
          <form action="submit" class="form-proposta" id="form-proposta">
            <section class="card">
              <h2>Cliente e Localização</h2>
              <div class="input-group">
                <label class="input-label">Canal de Vendas</label>
                <select type="text" class="input">
                    <option value="">Google</option>
                    <option value="">Facebook</option>
                </select>
            </div>
              <div class="input-group">
                  <label class="input-label">Nome</label>
                  <input type="text" class="input" id="nome-form__proposta">
              </div>
              <div class="input-group">
                  <label class="input-label">Celular</label>
                  <input type="text" class="input" id="celular-form__proposta">
              </div>
               <div class="grupo">
                <label class="label">Proposta Teste</label>
                <label class="switch">
                  <input type="checkbox" >
                  <span class="slider"></span>
                </label>
              </div>
              <div class="input-group">
                  <label class="input-label">Localização</label>
                  <select type="text" class="input" id="local-form__proposta">
                      <option value="Mogi das Cruzes">Mogi das Cruzes</option>
                      <option value="São Paulo">São Paulo</option>
                  </select>
              </div>
              <div class="input-group">
                <label class="input-label">HPS</label>
                <input type="text" class="input">
            </div>
            
            </section>
            <section class="card">
              <h2>Consumo e Instalação</h2>   
            <div class="input-group">
                <label class="input-label">Módulo</label>
                <select type="text" class="input">
                    <option value="">610Wp Tier 1</option>
                </select>
              </div>
              <div class="input-group">
                <label class="input-label">Inversor</label>
                <select type="text" class="input">
                    <option value="">String Ongrid</option>
                </select>
              </div>
              <div class="input-group">
                <label class="input-label">Instalação</label>
                <select type="text" class="input">
                    <option value="">Bifásico</option>
                    <option value="">Trifásico</option>
                </select>
            </div>
              <div class="input-group">
                <label class="input-label">Tellhado</label>
                <select type="text" class="input">
                    <option value="">Cerâmico</option>
                    <option value="">Alumínio</option>
                </select>
            </div>
            
            </section>
            <section class="card">
              <h2>Configuração e Promoção</h2>
             <div class="input-group">
                <label class="input-label">Tabela de Promoção</label>
                <input type="text" class="input">
            </div>
            <div class="grupo">
                <label class="label">Sistema Híbrido</label>
                <label class="switch">
                  <input type="checkbox" id="hibrido">
                  <span class="slider"></span>
                </label>
              </div>
               <div class="grupo">
              <label class="label">Expansão de Placas</label>
              <label class="switch">
                <input type="checkbox" id="expansao">
                <span class="slider"></span>
              </label>
            </div>
            <div class="input-quantidade" id="input-quantidade">
                  <label class="input-label-quantidade">Quantidade de placas</label>
                  <input type="text" class="input-quantidade-grupo" id="quantidade-form__proposta">
            </div>
                  <button class="btn btn--primary" id="btn-gerar">Gerar Proposta</button>
            </section>
                    </form>
        </section>
      </main>
    </section>
    <script src="js/script.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

  </body>
</html>
